name: Sync Research Reports to Archie Context Folder

on:
  schedule:
    # Every Monday at 9:00 AM UTC.
    # Adjust the hour if you need a different timezone
    # (e.g. 14 for 9 AM US-Eastern, 17 for 9 AM US-Pacific).
    - cron: "0 9 * * 1"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync script
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: python scripts/sync_reports.py

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: sync
    if: failure()
    steps:
      - name: Send failure notification
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            core.setFailed(
              `Research report sync failed. See ${runUrl} for details.`
            );
